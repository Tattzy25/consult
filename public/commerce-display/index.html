<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Commerce Display</title>
    <link rel="stylesheet" href="./panel.css" />
  </head>

  <body>
    <main class="commerce-panel" aria-label="Commerce display">
      <header class="commerce-panel-header">
        <span class="commerce-panel-status-dot" aria-hidden="true"></span>
        <span class="commerce-panel-title">Shopping assistant</span>
      </header>

      <section
        id="commerce-output"
        class="commerce-output"
        aria-live="polite"
      >
        <div class="commerce-empty-state" id="commerce-empty-state">
          <div class="commerce-empty-icon">✦</div>
          <h1>Ready to help you shop</h1>
          <p>
            Products, options, cart actions, and checkout links will appear
            here when needed.
          </p>
        </div>
      </section>
    </main>

    <script src="./panel.js"></script>
  </body>
</html>
